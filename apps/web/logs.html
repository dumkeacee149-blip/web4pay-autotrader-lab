<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent 操作日志（只读）</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="scanlines"></div>
  <main class="console lobster-console">
    <header class="hero lobster-hero">
      <div class="hero-copy-wrap">
        <div class="hero-copy">
          <h1>📜 Agent 操作日志（只读）</h1>
          <p class="sub">Human Read Only · 无交易按钮 · 仅展示日志与最近记录</p>
        </div>
      </div>
      <div class="hero-side hero-side-right">
        <a class="pixel-btn accent lobster-return" href="./auto-trade.html">← 返回交易页</a>
      </div>
    </header>

    <section class="grid">
      <article class="card full">
        <h2>实时操作日志</h2>
        <p class="help">此页面只读，不提供任何交易操作入口。</p>
        <pre id="readonlyLog" class="code" style="min-height: 320px; max-height: 58vh; overflow: auto;">加载中...</pre>
      </article>

      <article class="card full">
        <h2>最近策略记录</h2>
        <div id="readonlyHistory" class="report-list">加载中...</div>
      </article>
    </section>
  </main>

  <script>
    const LOG_KEY = 'web4pay_lobster_logs_v1';
    const HISTORY_KEY = 'web4pay_lobster_trades_v1';

    function readJson(key) {
      try {
        const raw = localStorage.getItem(key);
        const parsed = raw ? JSON.parse(raw) : [];
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function render() {
      const logEl = document.getElementById('readonlyLog');
      const histEl = document.getElementById('readonlyHistory');
      const logs = readJson(LOG_KEY);
      const history = readJson(HISTORY_KEY);

      logEl.textContent = logs.length ? logs.join('\n') : '暂无日志';

      if (!history.length) {
        histEl.textContent = '暂无记录';
        return;
      }

      histEl.innerHTML = history.map((item) => {
        const status = item.status === 'closed' ? '✅' : item.status === 'stopped' ? '⏹️' : '🧪';
        return `<div class="line"><strong>${status} ${item.pair || '-'} ${item.entryMode || ''}</strong> <small>(${new Date(item.createdAt).toLocaleString()})</small><div class="meta">PnL: ${Number(item.pnlPct || 0).toFixed(4)}% · entryTx: ${item.entryTx || '-'} · exitTx: ${item.exitTx || '-'} · reason: ${item.exitReason || '-'}</div></div>`;
      }).join('');
    }

    window.addEventListener('storage', render);
    window.setInterval(render, 2000);
    window.addEventListener('DOMContentLoaded', render);
  </script>
</body>
</html>
